name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch: amd64
          - target: aarch64-unknown-linux-musl
            arch: arm64
    steps:
      - uses: actions/checkout@v4
      # No libusb yet, so a plain static musl build suffices.
      # When the ANT+ slice adds libusb, switch to vendored libusb (libusb1-sys "vendored" feature).
      - uses: taiki-e/install-action@v2
        with:
          tool: cross
      - run: cross build --release --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: blebridge-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/blebridge

  image:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
      # Layout for Dockerfile.rust: dist/<TARGETARCH>/blebridge
      - run: |
          mkdir -p dist/amd64 dist/arm64
          mv dist/blebridge-amd64/blebridge dist/amd64/
          mv dist/blebridge-arm64/blebridge dist/arm64/
          chmod +x dist/amd64/blebridge dist/arm64/blebridge
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: dist
          file: Dockerfile.rust
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/zebradil/blebridge:${{ github.ref_name }}
            ghcr.io/zebradil/blebridge:latest
