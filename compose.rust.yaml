# Developer deploy: run the locally built Rust image on the Pi.
# Driven by `mise run deploy-rust`, which cross-builds `blebridge:local`,
# loads the tar onto the Pi (via DOCKER_HOST), then `up -d` here.
# pull_policy:never keeps the Pi from reaching ghcr for this local-only tag.
services:
  blebridge:
    image: blebridge:local
    pull_policy: never
    container_name: blebridge
    restart: unless-stopped
    network_mode: host
    # NOTE: C1:5C:7A:44:82:B9 is the treadmill's Bluetooth AUDIO module (A2DP),
    # not FTMS — do not pin it. The FTMS BLE peripheral (fixtures used ...82:BA)
    # only advertises when the console is in Bluetooth/app mode. Pin it here once
    # confirmed:
    # environment:
    #   - BLEBRIDGE_TREADMILL_MAC=C1:5C:7A:44:82:BA
    volumes:
      - /run/dbus:/run/dbus
    devices:
      - /dev/bus/usb:/dev/bus/usb
    cap_add:
      - NET_ADMIN
    mem_limit: 64m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
