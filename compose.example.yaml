# End-user deploy: run the Rust bridge from the image published to ghcr by the
# release workflow. Copy this file to your host and:
#   docker compose -f compose.example.yaml pull && docker compose -f compose.example.yaml up -d
# Developers use compose.rust.yaml + `mise run deploy-rust` for a locally built image instead.
services:
  blebridge:
    image: ghcr.io/zebradil/blebridge:latest
    container_name: blebridge
    restart: unless-stopped
    network_mode: host
    # Optional configuration (all have sensible defaults):
    # environment:
    #   # Pin the treadmill MAC if it isn't auto-discovered (e.g. FitShow "FS-"
    #   # modules that advertise no FTMS UUID until after connect):
    #   - BLEBRIDGE_TREADMILL_MAC=AA:BB:CC:DD:EE:FF
    #   # Name the App Endpoint advertises to mobile apps (default BLE_Bridge_Treadmill):
    #   - BLEBRIDGE_BLE_NAME=My Treadmill
    #   # Force adapter roles (default: auto; one adapter -> Degraded Mode, App Endpoint off):
    #   - BLEBRIDGE_LINK_ADAPTER=hci0
    #   - BLEBRIDGE_APP_ADAPTER=hci1
    volumes:
      - /run/dbus:/run/dbus
    devices:
      - /dev/bus/usb:/dev/bus/usb
    cap_add:
      - NET_ADMIN
    mem_limit: 64m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
